name: Market Weather Monitor

on:
  schedule:
    - cron: '0,30 * * * *' # 30분 간격으로 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          MARKET_WEBHOOK: ${{ secrets.MARKET_WEBHOOK }}
        run: python market_monitor.py
